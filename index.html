<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BudhuBytes</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at top left, rgba(67, 185, 255, 0.24), transparent 34rem),
          linear-gradient(135deg, #050a18, #111733 56%, #1b1235);
        color: #f2f7ff;
        display: flex;
        margin: 0;
        min-height: 100vh;
        padding: 32px;
      }

      main {
        background: rgba(5, 10, 24, 0.78);
        border: 1px solid rgba(117, 180, 255, 0.26);
        border-radius: 18px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
        margin: 0 auto;
        max-width: 760px;
        padding: clamp(28px, 6vw, 56px);
      }

      h1 {
        font-size: clamp(2.4rem, 7vw, 4.8rem);
        line-height: 0.95;
        margin: 0;
      }

      p {
        color: #b8c8e8;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        background: linear-gradient(135deg, #238dff, #7d5cff);
        border-radius: 10px;
        color: white;
        display: inline-block;
        font-weight: 800;
        margin-top: 16px;
        padding: 14px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BudhuBytes</h1>
      <p>Cybersecurity classroom tools, resources, and assignments for Ms. Budhu’s students.</p>
      <a href="/opening-tasks">Go to Opening Tasks</a>
    </main>
  </body>
</html>
